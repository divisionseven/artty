# =============================================================================
# Release Workflow — artty
# =============================================================================
# Triggered on tag push (e.g., git push origin v1.0.0)
# Builds sdist, wheel, and Windows .exe, publishes to PyPI, creates GitHub Release

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller --onefile --name artty src/artty/__main__.py

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/artty.exe

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Publish to PyPI using trusted publishing (no API token required)
    # Requires a PyPI publisher to be configured in the project settings
    environment:
      name: pypi
      url: https://pypi.org/p/artty
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password needed when using trusted publishing with id-token

  github-release:
    needs: [build, publish, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="$VERSION"
          # Extract section from CHANGELOG.md matching "## [VERSION] - YYYY-MM-DD"
          # up to the next "## [" section or end of file
          # Using awk for portable regex matching
          CHANGELOG=$(awk -v version="$VERSION" '
            $0 ~ "## \\[" version "\\]" { found=1; next }
            found && $0 ~ "^## \\[" { found=0 }
            found { print }
          ' CHANGELOG.md)
          echo "body=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}